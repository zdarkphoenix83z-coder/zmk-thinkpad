name: ZMK Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Clone ZMK source
        run: |
          git clone https://github.com/zmkfirmware/zmk.git

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git cmake ninja-build gperf \
          ccache dfu-util device-tree-compiler wget \
          python3-pip python3-setuptools python3-wheel xz-utils file make gcc gcc-multilib

      - name: Install west
        run: pip3 install west

      - name: Setup west
        run: |
          cd zmk
          west init -l app
          west update

      - name: Copy config
        run: |
          cp -r config zmk/app/config

      - name: Build firmware
        run: |
          cd zmk
          west build -s app -- -DZMK_CONFIG=app/config

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: zmk/build/zephyr/zmk.uf2
